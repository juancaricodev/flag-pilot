services:
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: ["pnpm", "--filter", "api", "exec", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://flag_pilot:${POSTGRES_PASSWORD}@postgres:5432/flag_pilot
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flag-pilot-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://flag_pilot:${POSTGRES_PASSWORD}@postgres:5432/flag_pilot
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: flag-pilot-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flag_pilot
      POSTGRES_USER: flag_pilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flag_pilot -d flag_pilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
