services:
  postgres:
    image: postgres:16-alpine
    container_name: flag-pilot-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flag_pilot
      POSTGRES_USER: flag_pilot
      POSTGRES_PASSWORD: flag_pilot_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
